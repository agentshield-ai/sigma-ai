title: Steganographic Data Hiding
id: 083d7427-a932-5e34-85b8-0867ad7eb18c
status: test
description: |
  Detects the use of steganographic tools and techniques that could be
  used to hide sensitive data within images, audio, or other media files
  for covert exfiltration purposes.
references:
  - https://attack.mitre.org/techniques/T1048/
  - https://attack.mitre.org/techniques/T1027/
  - https://arxiv.org/abs/2403.04783
author: AgentShield
date: "2026-02-16"
modified: "2026-02-24"
tags:
  - attack.exfiltration
  - attack.t1048
  - attack.defense-evasion
  - attack.t1027
logsource:
  product: ai_agent
  category: agent_events
detection:
  selection_steganography_tools:
    event_type: tool_call
    command|contains:
      - 'steghide'
      - 'stegano'
      - 'outguess'
      - 'jphide'
      - 'jsteg'
      - 'openstego'
      - 'F5-steganography'
  selection_steghide_embed:
    event_type: tool_call
    command|contains|all:
      - 'steghide'
      - 'embed'
  selection_exiftool_manipulation:
    event_type: tool_call
    command|contains|all:
      - 'exiftool'
      - '-overwrite_original'
  selection_python_lsb:
    event_type: tool_call
    command|contains:
      - 'PIL'
      - 'LSB'
      - 'least significant bit'
    # Custom: requires AgentShield file analysis engine
    file_extension: '.py'
  selection_python_stego_patterns:
    event_type: code_execution
    code|contains:
      - 'img.putpixel'
      - 'pixels[i] & 0xFE'
      - 'bin(ord(char))'
      - 'Image.open'
    code|contains|all:
      - 'for'
      - 'pixel'
  selection_audio_stego:
    event_type: tool_call
    command|contains:
      - 'hideme'
      - 'mp3stego'
      - 'deepsteg'
      - 'stegpy'
  selection_file_carving:
    event_type: tool_call
    command|contains:
      - 'binwalk'
      - 'foremost'
      - 'scalpel'
    command|contains: '-e'
  selection_suspicious_image_operations:
    event_type: file_write
    # Custom: requires AgentShield file analysis engine
    file_extension:
      - '.jpg'
      - '.png'
      - '.gif'
      - '.bmp'
    # Custom: requires AgentShield file size tracking
    size_increase_ratio: '>1.5'
  condition: selection_steganography_tools or selection_steghide_embed or selection_exiftool_manipulation or selection_python_lsb or selection_python_stego_patterns or selection_audio_stego or selection_file_carving or selection_suspicious_image_operations
falsepositives:
  - Digital forensics investigators using steganography detection tools
  - Image processing pipelines that legitimately modify pixel data or metadata
level: high
