title: Zero-Click RAG Exfiltration via Image URL
id: 30d14136-6ae1-5194-bc34-ed23d62c8fdc
status: stable
description: |
  Detects AI-generated responses that embed sensitive data inside image URL query
  strings as a covert exfiltration channel — the EchoLeak/GeminiJack pattern.
  A prompt-injected RAG document instructs the model to encode internal content
  as base64 or URL-encoded parameters in a markdown image tag; when rendered, the
  browser silently fires a GET request to an attacker-controlled domain, requiring
  no user interaction. Early detection prevents silent data theft from enterprise
  RAG deployments.
references:
  - https://attack.mitre.org/techniques/T1048/
  - https://airia.com/ai-security-in-2026-prompt-injection-the-lethal-trifecta-and-how-to-defend/
author: AgentShield
date: "2026-03-16"
modified: "2026-03-16"
tags:
  - attack.exfiltration
  - attack.t1048
logsource:
  product: ai_agent
  category: agent_events
detection:
  selection_markdown_image_exfil:
    event_type: llm_response
    response_text|contains:
      - '?d='
      - '?data='
      - '?q='
      - '?payload='
      - '?track='
    response_text|re: '!\[.*?\]\(https?://[^)]+\?[^)]*[A-Za-z0-9+/]{20,}={0,2}[^)]*\)'
  selection_img_tag_exfil:
    event_type: llm_response
    response_text|contains:
      - '<img '
      - 'src='
    response_text|re: '<img[^>]+src=.https?://[^>]*\?[^>]*[A-Za-z0-9+/]{20,}={0,2}[^>]*[>]'
  filter_known_good:
    response_text|contains:
      - 'microsoft.com'
      - 'github.com'
      - 'amazonaws.com'
      - 'azure.com'
      - 'openai.com'
  condition: (selection_markdown_image_exfil or selection_img_tag_exfil) and not filter_known_good
falsepositives:
  - Legitimate image CDNs that use long base64 tokens as image identifiers or
    signed URL parameters (e.g. AWS S3 pre-signed URLs, Cloudinary transformations)
  - Analytics or telemetry image pixels generated by approved marketing tools
    embedded in email templates retrieved by RAG
level: critical
