title: AI Agent Shadow MCP Server Credential Harvest Tool Invocation
id: 6931499b-522d-5890-98bf-edd7161c1621
status: test
description: |
  Detects AI agent invocations of MCP tool names that match credential harvesting
  patterns associated with rogue/shadow MCP servers. Attackers deploy fake MCP
  servers inside target networks that register tools with names mimicking legitimate
  automation (get_creds, fetch_ssh, list_secrets, dump_secrets) to trick AI agents
  into exfiltrating passwords, SSH keys, and Kubernetes secrets while the activity
  blends into routine agent automation traffic.
references:
  - https://attack.mitre.org/techniques/T1021/
  - https://www.blackfog.com/mcp-could-become-a-covert-channel-for-data-theft/
author: AgentShield
date: "2026-03-30"
modified: "2026-03-30"
tags:
  - attack.lateral-movement
  - attack.t1021
logsource:
  product: ai_agent
  category: agent_events
detection:
  selection_harvest_tool_names:
    event_type: tool_call
    command|contains:
      - 'get_creds'
      - 'fetch_ssh'
      - 'list_secrets'
      - 'get_env'
      - 'dump_secrets'
      - 'steal_token'
      - 'harvest_keys'
      - 'fetch_credentials'
      - 'get_secrets'
      - 'dump_tokens'
      - 'extract_keys'
  selection_harvest_keyword_pattern:
    event_type: tool_call
    command|re: '(get|fetch|dump|steal|harvest|extract|leak|exfil)_(cred|secret|token|key|pass|ssh|kubeconfig|serviceaccount)'
  condition: selection_harvest_tool_names or selection_harvest_keyword_pattern
falsepositives:
  - Legitimate secrets-management integrations (e.g. HashiCorp Vault MCP adapters) with tool names like get_secret or list_secrets scoped to authorized vaults
  - Internal developer tooling that exposes credential rotation functions with similar naming conventions
  - Security scanning agents that enumerate secrets to detect leaks under authorized scope
level: critical
