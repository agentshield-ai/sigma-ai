title: Markdown Image Exfiltration Pattern
id: e6e58cd1-d05a-5512-b3fb-3b6a38784ad9
status: stable
description: |
  Detects markdown image syntax with encoded data in URL parameters that
  may indicate data exfiltration attempts through image URLs. This pattern
  is commonly used in prompt injection attacks to steal sensitive information.
references:
  - https://attack.mitre.org/techniques/T1041/
  - https://attack.mitre.org/techniques/T1048/
  - https://owasp.org/www-project-top-10-for-large-language-model-applications/
  - https://embracethered.com/blog/posts/2024/claude-computer-use-c2-the-spaiware/
author: AgentShield
date: "2026-02-16"
modified: "2026-02-24"
tags:
  - attack.exfiltration
  - attack.t1041
  - attack.t1048
logsource:
  product: ai_agent
  category: agent_events
detection:
  selection_markdown_exfil:
    event_type: output_generation
    content|re: '!\[.*\]\(https?://[^\s)]+\?[^\s)]*=[A-Za-z0-9+/=%]{10,}\)'
  selection_data_params:
    event_type: output_generation
    content|contains:
      - '?data='
      - '&data='
      - '?exfil='
      - '&exfil='
      - '?mem='
      - '&mem='
      - '?info='
      - '&info='
      - '?query='
      - '&query='
      - '?secret='
      - '&secret='
  selection_base64_in_url:
    event_type: output_generation
    content|re: 'https?://[^\s)]+[?&][^=]+=([A-Za-z0-9+/]{4})*([A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=)?'
  selection_suspicious_domains:
    event_type: output_generation
    content|contains:
      - 'webhook.site'
      - 'requestcatcher.com'
      - 'hookbin.com'
      - 'requestbin.net'
      - 'postb.in'
      - 'pipedream.com'
  condition: (selection_markdown_exfil or selection_data_params) and (selection_base64_in_url or selection_suspicious_domains)
falsepositives:
  - Legitimate image links with analytics query parameters (e.g. UTM tracking)
  - Documentation or tutorials showing webhook integration examples
level: critical
