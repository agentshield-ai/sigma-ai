title: Write-Then-Execute Script in Temporary Directory
id: 2564f91e-155e-5d1c-afda-718922bb8a5f
related:
  - id: agent-write-then-execute-001
    type: obsoletes
  - id: a935a04a-61b2-5b55-a608-407a2048949a
    type: similar
status: stable
description: |
  Detects scripts written to temporary or world-writable directories and
  subsequent execution from those paths. Adversaries decompose attacks
  into individually benign steps: first writing a script to /tmp, /var/tmp,
  or /dev/shm, then executing it separately. The write step is the
  detectable event since the execution command alone contains no malicious
  indicators.
references:
  - https://attack.mitre.org/techniques/T1059/
  - https://attack.mitre.org/techniques/T1027/
  - https://arxiv.org/abs/2403.04783
author: AgentShield
date: "2026-02-26"
modified: "2026-02-26"
tags:
  - attack.execution
  - attack.t1059
  - attack.defense_evasion
  - attack.t1027
logsource:
  product: ai_agent
  category: agent_events
detection:
  selection_tmp_script_write:
    event_type: file_write
    file_path|startswith: '/tmp/'
    file_path|endswith:
      - '.py'
      - '.sh'
      - '.js'
      - '.rb'
      - '.pl'
      - '.php'
  selection_var_tmp_write:
    event_type: file_write
    file_path|startswith: '/var/tmp/'
    file_path|endswith:
      - '.py'
      - '.sh'
      - '.js'
      - '.rb'
      - '.pl'
      - '.php'
  selection_dev_shm_write:
    event_type: file_write
    file_path|startswith: '/dev/shm/'
    file_path|endswith:
      - '.py'
      - '.sh'
      - '.js'
      - '.rb'
      - '.pl'
      - '.php'
  selection_chmod_tmp:
    event_type: tool_call
    command|contains|all:
      - 'chmod'
      - '/tmp/'
  selection_exec_tmp_script:
    event_type: tool_call
    command|contains:
      - 'python /tmp/'
      - 'python3 /tmp/'
      - 'bash /tmp/'
      - 'sh /tmp/'
      - 'node /tmp/'
      - 'ruby /tmp/'
      - 'perl /tmp/'
  condition: selection_tmp_script_write or selection_var_tmp_write or selection_dev_shm_write or selection_chmod_tmp or selection_exec_tmp_script
falsepositives:
  - Build systems that compile and execute test scripts in /tmp during CI/CD pipelines
  - Package managers that extract and run post-install scripts from temporary directories
level: high
