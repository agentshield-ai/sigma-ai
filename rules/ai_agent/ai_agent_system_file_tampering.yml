title: System File Modification
id: 89404989-df81-5ae1-9b23-d9e845e9be65
status: stable
description: |
  Detects writes to critical system directories and binaries such as
  /etc/, /usr/bin/, or /usr/local/bin/. These modifications could
  indicate system compromise or backdoor installation.
references:
  - https://attack.mitre.org/techniques/T1543/
  - https://arxiv.org/abs/2403.04783
author: AgentShield
date: "2026-02-04"
modified: "2026-02-24"
tags:
  - attack.persistence
  - attack.t1543
logsource:
  product: ai_agent
  category: agent_events
detection:
  selection_etc_write:
    event_type: tool_call
    command|contains:
      - '> /etc/'
      - 'tee /etc/'
  selection_bin_write:
    event_type: tool_call
    command|contains:
      - '> /usr/bin/'
      - '> /usr/local/bin/'
      - 'cp '
    command|contains:
      - '/usr/bin/'
      - '/usr/local/bin/'
  selection_write_tool_etc:
    event_type: file_write
    file_path|startswith: '/etc/'
  selection_write_tool_bin:
    event_type: file_write
    file_path|startswith:
      - '/usr/bin/'
      - '/usr/local/bin/'
  condition: selection_etc_write or selection_bin_write or selection_write_tool_etc or selection_write_tool_bin
falsepositives:
  - Package managers writing to /etc/ or /usr/local/bin/ during legitimate installation
  - System configuration management tools (e.g. Ansible, Chef) updating /etc/ files
level: critical
